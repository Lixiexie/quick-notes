<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="随身速记">
<meta name="theme-color" content="#0a0a0c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" sizes="192x192" href="icon-192.png">
<title>随身速记</title>
<style>
:root {
  --accent: #a78bfa;
  --bg: #0a0a0c;
  --glass: rgba(28,28,32,0.72);
  --glass-border: rgba(255,255,255,0.06);
  --txt: #f5f5f7;
  --txt2: #98989d;
  --red: #ff453a;
  --green: #30d158;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
  --spring: cubic-bezier(0.22,0.85,0.35,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
.app{
  max-width: 500px; margin: 0 auto;
  height: 100vh; height: -webkit-fill-available;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* ===== GLASS BASE ===== */
.glass{
  background: var(--glass);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--glass-border);
}

/* ===== HOME: Card Carousel ===== */
.home-view{
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  z-index: 1;
}
.home-top{
  padding: calc(var(--safe-top) + 8px) 20px 0;
  display: flex; justify-content: space-between; align-items: center;
}
.home-top h1{
  font-size: 32px; font-weight: 700;
  letter-spacing: -0.02em;
}
.home-top .gear-btn{
  width: 38px; height: 38px; border-radius: 19px;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  color: var(--txt2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.gear-btn:active{ opacity:0.5 }

.card-stage{
  flex:1; display:flex; align-items:center;
  position:relative; overflow:visible;
}
.card-scroll{
  display:flex; gap: 12px; padding: 0 calc(50% - 140px);
  overflow-x:auto; scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  align-items:center;
  width:100%;
}
.card-scroll::-webkit-scrollbar{display:none}

.nb-card{
  flex:0 0 280px; height: 340px;
  background: var(--glass);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  scroll-snap-align:center;
  display:flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; cursor:pointer;
  transition: transform 0.35s var(--spring), box-shadow 0.35s var(--spring);
  position:relative; overflow:hidden;
  user-select:none;
}
.nb-card:active{ transform:scale(0.96) }
.nb-card .card-icon{ font-size: 56px; transition: transform 0.3s var(--spring) }
.nb-card:hover .card-icon{ transform: translateY(-4px) }
.nb-card .card-name{ font-size: 22px; font-weight: 600; letter-spacing: -0.01em }
.nb-card .card-count{ font-size: 14px; color: var(--txt2) }
.nb-card .card-hint{
  position:absolute; bottom: 18px;
  font-size: 12px; color: var(--txt2); opacity: 0.6;
}
.nb-card .card-shine{
  position:absolute; top: -50%; left: -50%; width:200%; height:200%;
  background: radial-gradient(circle at 50% 0%, var(--accent), transparent 70%);
  opacity: 0.04; pointer-events:none;
}

/* Empty card */
.nb-card.empty{
  border-style: dashed; border-color: rgba(255,255,255,0.1);
  opacity: 0.5;
}
.nb-card.empty .card-icon{ filter: grayscale(1); opacity:0.4 }

.page-dots{
  display:flex; gap:6px; justify-content:center;
  padding: 14px 0 0;
}
.page-dots span{
  width:6px; height:6px; border-radius:3px;
  background: rgba(255,255,255,0.2); transition: all 0.3s var(--spring);
}
.page-dots span.active{ background: var(--accent); width:18px }

.home-bottom{
  padding: 12px 20px calc(var(--safe-bot) + 10px);
  display:flex; gap:8px; align-items:center;
}
.theme-area{
  flex:1; display:flex; gap:6px; align-items:center;
}
.theme-input{
  width: 94px; padding: 8px 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 10px; color: var(--txt); font-size: 13px;
  font-family: 'SF Mono', 'Menlo', monospace; outline: none;
}
.theme-input:focus{ border-color: var(--accent) }
.preset-dots{ display:flex; gap:4px }
.preset-dot{
  width: 22px; height: 22px; border-radius: 11px;
  cursor:pointer; border: 2px solid transparent;
  transition: border-color 0.2s, transform 0.2s;
  flex:none;
}
.preset-dot:active{ transform:scale(0.85) }
.preset-dot.active{ border-color: #fff }

.double-tap-hint{
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: var(--txt2); opacity: 0;
  transition: opacity 0.5s; pointer-events: none;
}

/* ===== NOTES LIST VIEW ===== */
.notes-view{
  position: absolute; inset:0;
  background: var(--bg);
  display: flex; flex-direction: column;
  z-index:2;
  transform: translateX(105%);
  transition: transform 0.45s var(--spring);
}
.notes-view.open{ transform: translateX(0) }

.notes-nav{
  display:flex; align-items:center; justify-content:space-between;
  padding: calc(var(--safe-top) + 6px) 12px 10px;
  background: var(--glass);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border-bottom: 1px solid var(--glass-border);
  z-index:3;
}
.notes-nav .nav-btn{
  border:none; background:none; color: var(--accent); font-size: 17px;
  cursor: pointer; font-family: inherit; padding: 6px 8px;
}
.notes-nav .nav-btn:active{ opacity:0.4 }
.notes-nav .nav-title{ font-size: 17px; font-weight: 600; flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }

.notes-search{
  margin: 10px 16px 0; padding: 10px 14px;
  border: none; border-radius: 12px;
  background: rgba(255,255,255,0.06);
  color: var(--txt); font-size: 15px; font-family: inherit; outline: none;
}
.notes-search:focus{ background: rgba(255,255,255,0.1) }
.notes-search::placeholder{ color: var(--txt2) }

.notes-list-wrap{
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding: 12px 16px calc(var(--safe-bot) + 20px);
}
.note-row{
  display:flex; align-items:center; padding: 14px 16px;
  background: rgba(255,255,255,0.03); border-radius: 14px;
  margin-bottom: 6px; cursor:pointer;
  transition: background 0.2s;
  gap:12px;
}
.note-row:active{ background: rgba(255,255,255,0.06) }
.note-row .note-info{ flex:1; min-width:0 }
.note-row .note-title{ font-size: 16px; font-weight: 500 }
.note-row .note-preview{ font-size: 13px; color: var(--txt2); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.note-row .note-time{ font-size: 12px; color: var(--txt2); flex:none }
.note-row .del-btn{
  border:none; background:none; color: var(--txt2); font-size:14px;
  cursor:pointer; padding:6px; flex:none; opacity:0; transition:opacity 0.2s;
}
.note-row:hover .del-btn, .note-row:active .del-btn{ opacity:1 }
.note-row .del-btn:hover{ color: var(--red) }

.empty-notes{
  text-align:center; padding: 80px 20px; color: var(--txt2);
}
.empty-notes .empty-icon{ font-size:40px; margin-bottom: 8px; opacity:0.5 }
.empty-notes .empty-title{ font-size:16px; font-weight:500 }
.empty-notes .empty-sub{ font-size:13px; margin-top:4px; opacity:0.6 }

/* ===== EDITOR VIEW ===== */
.editor-view{
  position: absolute; inset:0; background: var(--bg);
  display: flex; flex-direction: column;
  z-index:4;
  transform: translateY(105%);
  transition: transform 0.45s var(--spring);
  border-radius: 24px 24px 0 0;
}
.editor-view.open{ transform: translateY(0) }

.editor-nav{
  display:flex; align-items:center; justify-content:space-between;
  padding: 10px 12px;
  background: var(--glass);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border-bottom: 1px solid var(--glass-border);
  border-radius: 24px 24px 0 0;
}
.editor-nav .nav-btn{ border:none; background:none; font-size: 17px; font-family:inherit; cursor:pointer; padding:6px 8px }
.editor-nav .nav-btn.cancel{ color: var(--txt2) }
.editor-nav .nav-btn.save{ color: var(--accent); font-weight:600 }
.editor-nav .nav-btn:active{ opacity:0.4 }
.editor-nav .nav-title{ font-size:15px; color:var(--txt2) }

.editor-body{
  flex:1; display:flex; flex-direction:column;
  padding: 20px 18px; overflow-y:auto;
}
.editor-body .title-input, .editor-body .content-input{
  border:none; outline:none; font-family:inherit;
  background:transparent; color:var(--txt); width:100%; resize:none;
}
.editor-body .title-input{
  font-size: 26px; font-weight: 600; letter-spacing: -0.01em;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 16px;
}
.editor-body .title-input::placeholder{ color: rgba(255,255,255,0.15) }
.editor-body .content-input{
  flex:1; font-size: 17px; line-height: 1.65;
  padding: 4px 0; min-height: 240px;
}
.editor-body .content-input::placeholder{ color: rgba(255,255,255,0.12) }
.editor-body .editor-save-indicator{
  font-size:12px; color: var(--green); text-align:center; padding:4px;
  transition:opacity 0.3s; opacity:0;
}
.editor-body .editor-save-indicator.show{ opacity:1 }
.editor-meta{ font-size:11px; color: var(--txt2); padding:12px 0 0; border-top:1px solid rgba(255,255,255,0.06); margin-top:16px }

/* ===== MODAL (dark iOS sheet) ===== */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  z-index:100; display:flex; align-items:flex-end; justify-content:center;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn{ from{opacity:0} to{opacity:1} }
.modal-sheet{
  background: #1c1c1e; width:100%; max-width:500px;
  border-radius: 16px 16px 0 0;
  padding: 8px 0 0;
  animation: slideUp 0.35s var(--spring);
}
@keyframes slideUp{ from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-section{
  background: rgba(255,255,255,0.04); border-radius: 14px;
  margin: 8px 14px; overflow:hidden;
}
.modal-input{
  width:100%; border:none; padding: 14px 16px; font-size: 17px;
  font-family: inherit; outline: none; background: transparent; color: var(--txt);
}
.modal-input::placeholder{ color: var(--txt2) }
.modal-row{
  padding: 14px 16px; text-align:center; font-size: 17px;
  cursor:pointer; border-bottom: 0.5px solid rgba(255,255,255,0.06);
  color: var(--txt);
}
.modal-row:last-child{ border-bottom:none }
.modal-row.primary{ color: var(--accent); font-weight:500 }
.modal-row.destructive{ color: var(--red) }
.modal-row:active{ background: rgba(255,255,255,0.06) }
.modal-cancel{
  padding: 14px; text-align:center; font-size: 17px; font-weight:600;
  cursor:pointer; background: rgba(255,255,255,0.04); border-radius: 14px;
  margin: 8px 14px;
}
.modal-cancel:active{ background: rgba(255,255,255,0.08) }

/* Icon Pick */
.icon-grid{ display:flex; flex-wrap:wrap; gap:6px; padding:12px 16px }
.icon-opt{
  width:42px; height:42px; border-radius:12px;
  font-size:22px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; background: rgba(255,255,255,0.04);
  border: 2px solid transparent; transition: border-color 0.2s;
}
.icon-opt.sel{ border-color: var(--accent); background: rgba(255,255,255,0.1) }

/* Toast */
.toast{
  position:fixed; top: calc(var(--safe-top) + 60px); left:50%;
  transform: translateX(-50%);
  background: rgba(44,44,48,0.95); color: var(--txt);
  padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight:500;
  z-index:200; opacity:0; transition: opacity 0.3s; pointer-events:none;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.toast.show{ opacity:1 }

.hidden{ display:none!important }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- === HOME: Card Carousel === -->
  <div class="home-view" id="homeView">
    <div class="home-top">
      <h1>随身速记</h1>
      <button class="gear-btn" onclick="showThemePanel()" title="主题设置">⚙</button>
    </div>
    <div class="card-stage" id="cardStage">
      <div class="card-scroll" id="cardScroll" onscroll="updateDots()"></div>
    </div>
    <div class="page-dots" id="pageDots"></div>
    <div class="home-bottom">
      <div class="theme-area">
        <input class="theme-input" id="themeInput" placeholder="#a78bfa" maxlength="7" oninput="applyTheme(this.value)">
        <div class="preset-dots" id="presetDots"></div>
      </div>
    </div>
    <div class="double-tap-hint" id="dblHint">双击空白处新建笔记本 ✨</div>
  </div>

  <!-- === NOTES LIST === -->
  <div class="notes-view" id="notesView">
    <div class="notes-nav">
      <button class="nav-btn" onclick="closeNotes()">← 返回</button>
      <span class="nav-title" id="notesTitle"></span>
      <button class="nav-btn" onclick="newNote()">✏️</button>
    </div>
    <input class="notes-search hidden" id="notesSearch" placeholder="搜索笔记..." oninput="renderNotes()">
    <div class="notes-list-wrap" id="notesListWrap"></div>
  </div>

  <!-- === EDITOR === -->
  <div class="editor-view" id="editorView">
    <div class="editor-nav">
      <button class="nav-btn cancel" onclick="closeEditor()">取消</button>
      <span class="nav-title">编辑笔记</span>
      <button class="nav-btn save" onclick="saveAndClose()">完成</button>
    </div>
    <div class="editor-body">
      <input class="title-input" id="editorTitle" placeholder="标题" oninput="scheduleAutoSave()">
      <textarea class="content-input" id="editorContent" placeholder="开始写..." oninput="scheduleAutoSave()"></textarea>
      <div class="editor-save-indicator" id="saveIndicator">已保存</div>
      <div class="editor-meta" id="editorMeta"></div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-section" id="modalContent"></div>
    <div class="modal-cancel" onclick="closeModal()">取消</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ DATA LAYER (reused) ============
const STORE_KEY = 'quick_notes_data';
const THEME_KEY = 'quick_notes_theme';

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8) }

function loadData(){
  try{ const d=JSON.parse(localStorage.getItem(STORE_KEY)); return d&&d.notebooks?d:{notebooks:[],notes:[]} }
  catch{ return {notebooks:[],notes:[]} }
}
function saveData(d){ localStorage.setItem(STORE_KEY,JSON.stringify(d)) }

function loadTheme(){ try{ return localStorage.getItem(THEME_KEY)||'#a78bfa' }catch{ return'#a78bfa' } }
function saveTheme(c){ localStorage.setItem(THEME_KEY,c) }

let data = loadData();
let currentNb = null;
let editingId = null;
let autoSaveTimer = null;

// ============ THEME ============
const PRESETS = ['#a78bfa','#60a5fa','#34d399','#fbbf24','#f472b6','#fb923c'];

function initTheme(){
  const c = loadTheme();
  applyTheme(c);
  document.getElementById('themeInput').value = c;
  // 预设色块
  document.getElementById('presetDots').innerHTML = PRESETS.map(p =>
    `<div class="preset-dot${p===c?' active':''}" style="background:${p}" onclick="setPreset('${p}')"></div>`
  ).join('');
}

function applyTheme(val){
  if(!val||val.length<4) return;
  let c = val.trim();
  if(!c.startsWith('#')) c = '#'+c;
  if(c.length<4) return;
  document.documentElement.style.setProperty('--accent', c);
  // Update active dot
  document.querySelectorAll('.preset-dot').forEach(d=>d.classList.toggle('active',d.style.background===c||d.style.background.replace(/\s/g,'')===c));
}

function setPreset(c){
  document.getElementById('themeInput').value = c;
  applyTheme(c);
  saveTheme(c);
  document.querySelectorAll('.preset-dot').forEach(d=>d.classList.toggle('active',d.style.background.replace(/\s/g,'')===c.replace(/\s/g,'')));
}

// Theme input: save on blur
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('themeInput').addEventListener('blur',function(){
    const c = this.value.trim();
    if(c&&c.startsWith('#')&&c.length>=4){ saveTheme(c); updatePresetDots(c) }
  });
  document.getElementById('themeInput').addEventListener('keydown',function(e){
    if(e.key==='Enter'){ const c=this.value.trim(); if(c&&c.startsWith('#')&&c.length>=4){ saveTheme(c); updatePresetDots(c); this.blur() } }
  });
});

function updatePresetDots(c){
  document.querySelectorAll('.preset-dot').forEach(d=>d.classList.toggle('active',d.style.background.replace(/\s/g,'')===c.replace(/\s/g,'')));
}

// ============ HOME: Card Carousel ============
function renderHome(){
  const scroll = document.getElementById('cardScroll');
  const dots = document.getElementById('pageDots');
  const hint = document.getElementById('dblHint');

  let html = '';
  data.notebooks.forEach(nb=>{
    const count = data.notes.filter(n=>n.notebookId===nb.id).length;
    html += `<div class="nb-card" onclick="openNotes('${nb.id}')">
      <div class="card-shine"></div>
      <span class="card-icon">${nb.icon}</span>
      <span class="card-name">${esc(nb.name)}</span>
      <span class="card-count">${count} 条笔记</span>
      <span class="card-hint">点击进入 →</span>
    </div>`;
  });
  // Add "empty" card for double-tap creation
  html += `<div class="nb-card empty" id="emptyCard">
    <span class="card-icon">＋</span>
    <span class="card-name">新建笔记本</span>
    <span class="card-count">双击此处创建</span>
  </div>`;
  scroll.innerHTML = html;

  // Dots
  const n = data.notebooks.length + 1;
  if(n<=1){ dots.innerHTML=''; return }
  dots.innerHTML = Array.from({length:n},(_,i)=>`<span class="${i===0?'active':''}"></span>`).join('');
  if(data.notebooks.length===0) hint.style.opacity='1';
  else hint.style.opacity='0';
}

function updateDots(){
  const scroll = document.getElementById('cardScroll');
  const dots = document.querySelectorAll('#pageDots span');
  if(!dots.length) return;
  const idx = Math.round(scroll.scrollLeft / 292);
  dots.forEach((d,i)=>d.classList.toggle('active',i===idx));
}

// Double-tap on empty card or card stage
let tapTimer = null;
document.addEventListener('DOMContentLoaded',()=>{
  const stage = document.getElementById('cardStage');
  stage.addEventListener('click',function(e){
    if(e.target.closest('.nb-card')&&!e.target.closest('.nb-card.empty')) return;
    if(e.target.closest('.nb-card.empty')){
      if(tapTimer){ clearTimeout(tapTimer); tapTimer=null; showAddNb(); return }
      tapTimer = setTimeout(()=>{ tapTimer=null }, 350);
      return;
    }
    // Click on blank area of stage
    if(e.target===stage||e.target.classList.contains('card-scroll')){
      if(tapTimer){ clearTimeout(tapTimer); tapTimer=null; showAddNb(); return }
      tapTimer = setTimeout(()=>{ tapTimer=null }, 350);
    }
  });
  // Also dblclick
  stage.addEventListener('dblclick',function(e){
    if(e.target.closest('.nb-card')&&!e.target.closest('.nb-card.empty')) return;
    showAddNb();
  });
});

// ============ NOTES LIST ============
function openNotes(nbId){
  currentNb = data.notebooks.find(n=>n.id===nbId);
  document.getElementById('notesTitle').textContent = currentNb ? currentNb.icon+' '+currentNb.name : '';
  document.getElementById('notesSearch').classList.add('hidden');
  document.getElementById('notesSearch').value = '';
  document.getElementById('notesView').classList.add('open');
  renderNotes();
}

function closeNotes(){
  document.getElementById('notesView').classList.remove('open');
  currentNb = null;
  setTimeout(renderHome, 400);
}

function newNote(){
  const note = {
    id: uid(), notebookId: currentNb.id, title:'', content:'',
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  };
  data.notes.unshift(note);
  saveData(data);
  openEditor(note.id);
}

function renderNotes(){
  const wrap = document.getElementById('notesListWrap');
  let notes = data.notes.filter(n=>n.notebookId===currentNb.id);
  const q = document.getElementById('notesSearch').value.trim().toLowerCase();
  if(q) notes = notes.filter(n=>n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q));
  notes.sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));

  if(!notes.length){
    wrap.innerHTML = `<div class="empty-notes" id="emptyNotes"><div class="empty-icon">📄</div><div class="empty-title">${q?'没有匹配':'还没有笔记'}</div><div class="empty-sub">${q?'':'双击空白处新建 ✨'}</div></div>`;
    // double-tap on empty
    const empty = document.getElementById('emptyNotes');
    if(empty){
      let t;
      empty.addEventListener('click',function(){
        if(t){ clearTimeout(t); t=null; newNote(); return }
        t = setTimeout(()=>{ t=null }, 350);
      });
    }
    return;
  }

  wrap.innerHTML = notes.map(n=>{
    const preview = (n.content||'').replace(/\n/g,' ').slice(0,40);
    return `<div class="note-row" onclick="openEditor('${n.id}')">
      <div class="note-info">
        <div class="note-title">${esc(n.title||'无标题')}</div>
        ${preview?`<div class="note-preview">${esc(preview)}</div>`:''}
      </div>
      <span class="note-time">${fmtShort(n.updatedAt)}</span>
      <button class="del-btn" onclick="event.stopPropagation();delNote('${n.id}')">🗑</button>
    </div>`;
  }).join('');

  // Double-tap on blank area of wrap
  let t2;
  wrap.addEventListener('click',function(e){
    if(e.target===wrap||e.target===wrap.firstElementChild){
      if(t2){ clearTimeout(t2); t2=null; newNote(); return }
      t2 = setTimeout(()=>{ t2=null }, 350);
    }
  });
  wrap.addEventListener('dblclick',function(e){
    if(e.target===wrap||e.target===wrap.firstElementChild) newNote();
  });
}

function delNote(id){
  data.notes = data.notes.filter(n=>n.id!==id);
  saveData(data);
  renderNotes();
  renderHome();
}

// ============ EDITOR ============
function openEditor(noteId){
  editingId = noteId;
  const note = data.notes.find(n=>n.id===noteId);
  document.getElementById('editorTitle').value = note?note.title:'';
  document.getElementById('editorContent').value = note?note.content:'';
  document.getElementById('editorMeta').textContent = note?'创建于 '+fmtFull(note.createdAt):'新建笔记';
  document.getElementById('saveIndicator').classList.remove('show');
  document.getElementById('editorView').classList.add('open');
  setTimeout(()=>{
    if(note&&note.title){ document.getElementById('editorContent').focus() }
    else{ document.getElementById('editorTitle').focus() }
  }, 400);
}

function closeEditor(){
  clearTimeout(autoSaveTimer);
  autoSaveNow();
  editingId = null;
  document.getElementById('editorView').classList.remove('open');
  setTimeout(renderNotes, 400);
}

function doSave(){
  const title = document.getElementById('editorTitle').value.trim();
  const content = document.getElementById('editorContent').value;
  if(!title&&!content) return;
  if(editingId){
    const note = data.notes.find(n=>n.id===editingId);
    if(note){
      note.title = title||content.split('\n')[0]||'无标题';
      note.content = content;
      note.updatedAt = new Date().toISOString();
    }
  }
  saveData(data);
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('show');
  setTimeout(()=>ind.classList.remove('show'), 1500);
}

function autoSaveNow(){ doSave() }
function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(doSave, 1500);
}
function saveAndClose(){ clearTimeout(autoSaveTimer); doSave(); closeEditor(); renderHome() }

// ============ NOTEBOOK CRUD (modal-based) ============
const NB_ICONS = ['📋','🏠','💡','📝','🎯','📖','💼','🌟','🎨','✈️','🍔','❤️','🎵','📸','🔬','💻','🎮','🏃','🧘','🌿'];

function showAddNb(){
  let selIcon = '📋';
  let html = `<input class="modal-input" id="nbName" placeholder="笔记本名称" autofocus>`;
  html += `<div class="icon-grid">`;
  NB_ICONS.forEach(ic=>{
    html += `<div class="icon-opt${ic===selIcon?' sel':''}" onclick="selIcon(this,'${ic}')">${ic}</div>`;
  });
  html += `</div>`;
  html += `<div class="modal-row primary" onclick="createNb()">创建笔记本</div>`;
  openModal(html);
  window._selIcon = selIcon;
}
function selIcon(el,ic){ document.querySelectorAll('.icon-opt').forEach(e=>e.classList.remove('sel')); el.classList.add('sel'); window._selIcon=ic }
function createNb(){
  const name = document.getElementById('nbName').value.trim();
  if(!name){ toast('请输入名称'); return }
  data.notebooks.push({ id:uid(), name, icon:window._selIcon, createdAt: new Date().toISOString() });
  saveData(data);
  closeModal();
  renderHome();
}

// ============ MODAL ============
function openModal(html){ document.getElementById('modalContent').innerHTML=html; document.getElementById('modal').classList.remove('hidden') }
function closeModal(e){ if(e&&e.target!==document.getElementById('modal'))return; document.getElementById('modal').classList.add('hidden') }

// ============ TOAST ============
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1800);
}

// ============ UTILS ============
function esc(s){ const e=document.createElement('span'); e.textContent=s; return e.innerHTML }
function fmtShort(iso){
  if(!iso)return'';
  const d=new Date(iso), now=new Date();
  if(now-d<86400000&&now.getDate()===d.getDate()) return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  return (d.getMonth()+1)+'/'+d.getDate();
}
function fmtFull(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// ============ KEYBOARD ============
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(!document.getElementById('modal').classList.contains('hidden')) closeModal();
    else if(document.getElementById('editorView').classList.contains('open')) closeEditor();
    else if(document.getElementById('notesView').classList.contains('open')) closeNotes();
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='s'&&document.getElementById('editorView').classList.contains('open')){
    e.preventDefault(); clearTimeout(autoSaveTimer); doSave(); toast('已保存');
  }
});

// ============ SW ============
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ============ INIT ============
initTheme();
if(!data.notebooks.length){
  data.notebooks.push({ id:uid(), name:'我的笔记', icon:'📝', createdAt: new Date().toISOString() });
  saveData(data);
}
renderHome();
</script>
